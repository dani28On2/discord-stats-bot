name: Actualizar leaderboard

on:
  # Botón "Run workflow" en la pestaña Actions del repo.
  workflow_dispatch:

  # Programado: cada hora en punto (UTC).
  # Cambia el patrón si quieres otra frecuencia:
  #   "*/30 * * * *"  -> cada 30 minutos
  #   "0 */6 * * *"   -> cada 6 horas
  schedule:
    - cron: "0 * * * *"

# Evita ejecuciones solapadas (manual + programada).
concurrency:
  group: actualizar-leaderboard
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar el repositorio
        # Versión v5 (Node 24) -> elimina el warning de Node 20.
        uses: actions/checkout@v5

      - name: Configurar Python
        # Versión v6 (Node 24).
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar la actualización por lotes
        env:
          # PYTHONPATH=. permite imports planos (config, database, etc.)
          PYTHONPATH: .
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python batch_update.py
