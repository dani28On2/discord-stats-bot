name: Actualizar leaderboard

# --- Cuándo se ejecuta ---
on:
  # 1) MANUAL: aparece un botón "Run workflow" en la pestaña Actions.
  workflow_dispatch:

  # 2) AUTOMÁTICO: cada hora en punto (la hora del cron es UTC).
  #    Cambia el patrón si quieres otra frecuencia, por ejemplo:
  #      "*/30 * * * *"  -> cada 30 minutos
  #      "0 */6 * * *"   -> cada 6 horas
  #    AVISO: GitHub no garantiza la hora exacta (puede retrasarse en
  #    horas de carga) y desactiva el cron si el repo pasa ~60 días
  #    sin actividad. El botón manual no tiene esas limitaciones.
  schedule:
    - cron: "0 * * * *"

# Evita que dos ejecuciones a la vez (manual + programada) choquen.
concurrency:
  group: actualizar-leaderboard
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # red de seguridad: si algo se cuelga, se corta

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar la actualización por lotes
        env:
          PYTHONPATH: .  # <-- ¡AÑADE ESTA LÍNEA!
          # Estos secretos DEBEN existir en el repositorio
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TARGET_CHANNEL_NAME: ${{ secrets.TARGET_CHANNEL_NAME }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python batch_update.py
